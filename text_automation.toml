# Runtime configuration for text-automation

env = "dev"

[reporting]
# SQLite database for idempotency caches and lightweight reporting
database = "src/text_automation/reporting/TextDatabase.db"

[direct_inquiry]
# OAuth token storage for Gmail API
token_path = "src/text_automation/direct_inquiry/token.json"
# Vegas center IDs (special business-hours handling)
vegas_ids = [6, 11, 15, 16, 60, 110]
phone_blacklist = ["2499618600", "2563668195", "8852895525", "2206940173", "8557588624", "3454497480"]

[student_intake]
# Separate Gmail OAuth token path for Student Intake ingestion
token_path = "src/text_automation/student_auto/token.json"

# Optional grade mappings (override defaults)
[direct_inquiry.grade_phrase_map]
Kindergarten = "Kindergartener"
"1st Grade" = "1st grader"
